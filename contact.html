    <style>
        /* Основные стили страницы (темный фон как на фото) */
        body {
            background-color: #1a1d21; /* Темно-серый фон */
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center; /* Центрирование по горизонтали */
            min-height: 100vh;
        }

        /* Стиль для заголовка */
        .page-header {
            font-size: 24px;
            font-weight: bold;
            margin-top: 30px; /* Отступ сверху */
            margin-bottom: 30px; /* Отступ до кнопок */
            text-align: center;
        }

        /* Контейнер для кнопок, задающий отступы по краям */
        .buttons-container {
            width: 80%; /* Занимает 80% ширины (автоматически дает по 10% отступа по бокам) */
            display: flex;
            flex-direction: column;
            gap: 15px; /* Расстояние между кнопками */
            align-items: center;
        }

        /* Общий стиль для растянутых кнопок/ссылок */
        .social-button {
            display: flex;
            align-items: center;
            justify-content: center; /* Текст и иконка по центру */
            width: 100%; /* Растягивается на всю ширину контейнера (80%) */
            padding: 35px;
            border-radius: 10px;
            text-decoration: none; /* Убирает подчеркивание ссылки */
            font-weight: bold;
            transition: opacity 0.2s; /* Эффект при наведении */
        }

        .social-button:hover {
            opacity: 0.8;
        }

        /* Стили для иконок внутри кнопок */
        .button-icon {
            width: 24px;
            height: 24px;
            margin-right: 10px; /* Отступ от иконки до текста */
        }

        /* Специфические цвета для каждой кнопки (взяты из вашего примера) */
        .btn-whatsapp {
            background-color: #25D366; /* Зеленый WhatsApp */
            color: white;
            border-radius: 50px; /* Сильно округлые края */
            margin-top: auto; /* Прижимает к низу */
            margin-bottom: 20px;
        }

        .btn-max {
