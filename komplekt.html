<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог Комплектующие</title>
    <link rel="icon" href="uidownload.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1c24;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
        }

        /* --- СТИЛИ СЛАЙДЕРА (КАК НА ФОТО) --- */
        .slider-container {
            position: relative;
            max-width: 1000px; /* Ширина как на скриншоте */
            margin: 40px auto;
            height: 500px;
            overflow: hidden;
            border-radius: 4px;
            background-color: #000;
        }

        .slides {
            display: flex;
            transition: transform 0.5s ease-in-out;
            height: 100%;
        }

        .slide {
            min-width: 100%;
            height: 100%;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Чтобы фото красиво заполняло область */
        }

        /* Кнопки стрелки */
        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.3);
            color: white;
            padding: 15px;
            cursor: pointer;
            border-radius: 50%;
            user-select: none;
            border: none;
            font-size: 20px;
            margin: 0 10px;
            transition: background 0.3s;
        }

        .prev:hover, .next:hover { background: rgba(255,255,255,0.6); }
        .next { right: 0; }

        /* Точки (индикаторы) внизу */
        .dots-container {
            text-align: center;
            position: absolute;
            bottom: 20px;
            width: 100%;
        }

        .dot {
            cursor: pointer;
            height: 10px;
            width: 10px;
            margin: 0 5px;
            background-color: rgba(255,255,255,0.5);
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.6s ease;
        }

        .active-dot, .dot:hover { background-color: #fff; }

        /* --- СТИЛИ ГАЛЕРЕИ (НИЖНЯЯ ЧАСТЬ) --- */
        h1 { text-align: center; margin: 40px 0 20px; font-weight: 300; }

        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .gallery-item {
            aspect-ratio: 1/1;
            overflow: hidden;
            cursor: pointer;
            border-radius: 4px;
            background: #fff;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.3s;
            display: block;
        }

        .gallery-item:hover img { transform: scale(1.05); }

        /* Lightbox (увеличение) */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .lightbox img { max-width: 90%; max-height: 90%; }
 .arrow-img{
        width: 20px;
        height: auto;
        vertical-align: middle;
        margin-right: 5px;
    }
    /* Общий медиа-запрос для мобильных (до 768px) */
@media (max-width: 768px) {
    .hero {
        height: auto; /* На мобильных лучше не фиксировать высоту 90vh, если текста много */
        padding: 80px 20px;
    }

    .about-section {
        gap: 30px; /* Уменьшаем расстояние между текстом и фото */
        padding: 60px 20px;
    }

    .about-title {
        font-size: 28px; /* Огромные заголовки плохо смотрятся на малых экранах */
    }

    .contact-map {
        height: 250px; /* Уменьшаем карту, чтобы она не занимала весь экран */
    }
}

/* Исправление для маленьких экранов (до 400px) */
@media (max-width: 400px) {
    .about-image-wrapper {
        min-width: 100%;
    }
    
    .btn {
        width: 100%; /* Кнопки на всю ширину удобнее нажимать пальцем */
    }
}
    </style>
</head>
<body>
    <button id="backButton" class="back-btn"><img src="left-arrow.png" alt="back" class="arrow-img"></button>

    <div class="slider-container">
        <div class="slides" id="slideTrack">
            <div class="slide"><img src="slk4.jpg"></div>
            <div class="slide"><img src="slk5.jpg"></div>

        </div>

        <button class="prev" onclick="moveSlide(-1)">&#10094;</button>
        <button class="next" onclick="moveSlide(1)">&#10095;</button>

        <div class="dots-container">
            <span class="dot" onclick="currentSlide(0)"></span>
            <span class="dot" onclick="currentSlide(1)"></span>

    <div class="lightbox" id="lb" onclick="this.style.display='none'">
        <img id="lbImg" src="">
    </div>

    <script>
        // ЛОГИКА СЛАЙДЕРА
        let currentIdx = 0;
        const slides = document.getElementById('slideTrack');
        const dots = document.getElementsByClassName('dot');

        function updateSlider() {
            slides.style.transform = `translateX(-${currentIdx * 100}%)`;
            for (let i = 0; i < dots.length; i++) {
                dots[i].classList.remove('active-dot');
            }
            dots[currentIdx].classList.add('active-dot');
        }

        function moveSlide(n) {
            currentIdx += n;
            if (currentIdx >= dots.length) currentIdx = 0;
            if (currentIdx < 0) currentIdx = dots.length - 1;
            updateSlider();
        }

        function currentSlide(n) {
            currentIdx = n;
            updateSlider();
        }
        
        updateSlider(); // Инициализация

        // ЛОГИКА УВЕЛИЧЕНИЯ ФОТО
        const lb = document.getElementById('lb');
        const lbImg = document.getElementById('lbImg');
        
        document.querySelectorAll('.gallery-item img').forEach(img => {
            img.onclick = () => {
                lb.style.display = 'flex';
                lbImg.src = img.src;
            }
        });
        document.getElementById('backButton').onclick = function() {
    window.history.go(-1); // Переход на 1 шаг назад
};
    </script>
</body>
</html>
